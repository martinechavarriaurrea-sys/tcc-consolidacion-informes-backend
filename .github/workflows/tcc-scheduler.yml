name: TCC Scheduler

on:
  schedule:
    # America/Bogota is UTC-5 year round.
    - cron: "0 12 * * *"      # 07:00 Bogota
    - cron: "0 17 * * *"      # 12:00 Bogota
    - cron: "0 21 * * *"      # 16:00 Bogota
    - cron: "0 11 * * 1"      # cleanup, Monday 06:00 Bogota
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - alerts
          - cleanup
      cycle:
        description: "Daily cycle"
        required: false
        default: "0700"
        type: choice
        options:
          - "0700"
          - "1200"
          - "1600"

concurrency:
  group: tcc-scheduler
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BACKEND_URL: https://tcc-consolidacion-informes-backend.vercel.app
      OIDC_AUDIENCE: tcc-consolidacion-informes-backend
    steps:
      - name: Resolve scheduled job
        id: target
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.job }}" in
              daily)
                echo "path=/api/cron/daily-dispatch?cycle=${{ inputs.cycle }}" >> "$GITHUB_OUTPUT"
                echo "job=daily" >> "$GITHUB_OUTPUT"
                echo "cycle=${{ inputs.cycle }}" >> "$GITHUB_OUTPUT"
                ;;
              weekly)
                echo "path=/api/cron/weekly" >> "$GITHUB_OUTPUT"
                echo "job=weekly" >> "$GITHUB_OUTPUT"
                ;;
              alerts)
                echo "path=/api/cron/alerts" >> "$GITHUB_OUTPUT"
                echo "job=alerts" >> "$GITHUB_OUTPUT"
                ;;
              cleanup)
                echo "path=/api/cron/cleanup" >> "$GITHUB_OUTPUT"
                echo "job=cleanup" >> "$GITHUB_OUTPUT"
                ;;
            esac
            exit 0
          fi

          case "${{ github.event.schedule }}" in
            "0 12 * * *")
              echo "path=/api/cron/daily-dispatch?cycle=0700" >> "$GITHUB_OUTPUT"
              echo "job=daily" >> "$GITHUB_OUTPUT"
              echo "cycle=0700" >> "$GITHUB_OUTPUT"
              ;;
            "0 17 * * *")
              echo "path=/api/cron/daily-dispatch?cycle=1200" >> "$GITHUB_OUTPUT"
              echo "job=daily" >> "$GITHUB_OUTPUT"
              echo "cycle=1200" >> "$GITHUB_OUTPUT"
              ;;
            "0 21 * * *")
              echo "path=/api/cron/daily-dispatch?cycle=1600" >> "$GITHUB_OUTPUT"
              echo "job=daily" >> "$GITHUB_OUTPUT"
              echo "cycle=1600" >> "$GITHUB_OUTPUT"
              ;;
            "0 11 * * 1")
              echo "path=/api/cron/cleanup" >> "$GITHUB_OUTPUT"
              echo "job=cleanup" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported schedule: ${{ github.event.schedule }}" >&2
              exit 1
              ;;
          esac

      - name: Request GitHub OIDC token
        id: oidc
        shell: bash
        run: |
          set -euo pipefail

          token_json=$(
            curl --silent --show-error --fail-with-body \
              --header "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}"
          )
          token=$(python3 -c 'import json, sys; print(json.load(sys.stdin)["value"])' <<< "${token_json}")
          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - name: Checkout backend worker
        if: steps.target.outputs.job == 'daily' || steps.target.outputs.job == 'alerts'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.target.outputs.job == 'daily' || steps.target.outputs.job == 'alerts'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        if: steps.target.outputs.job == 'daily' || steps.target.outputs.job == 'alerts'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GitHub TCC worker (consulta TCC + genera PDF; Outlook local envia email)
        if: steps.target.outputs.job == 'daily'
        shell: bash
        env:
          BACKEND_URL: ${{ env.BACKEND_URL }}
          CRON_TOKEN: ${{ steps.oidc.outputs.token }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          SKIP_SMTP_EMAIL: "true"
        run: |
          set -euo pipefail
          python scripts/github_tracking_worker.py daily "${{ steps.target.outputs.cycle }}"

      - name: Run alert email worker (verifica 72h + envia email si hay alertas)
        if: steps.target.outputs.job == 'alerts'
        shell: bash
        env:
          BACKEND_URL: ${{ env.BACKEND_URL }}
          CRON_TOKEN: ${{ steps.oidc.outputs.token }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          set -euo pipefail
          python scripts/alert_email_worker.py

      - name: Call backend cron endpoint (weekly / cleanup)
        if: steps.target.outputs.job == 'weekly' || steps.target.outputs.job == 'cleanup'
        shell: bash
        run: |
          set -euo pipefail

          endpoint="${BACKEND_URL}${{ steps.target.outputs.path }}"
          echo "Calling ${endpoint}"

          for attempt in 1 2 3; do
            status=$(
              curl --silent --show-error --location \
                --max-time 900 \
                --output response.json \
                --write-out "%{http_code}" \
                --header "Authorization: Bearer ${{ steps.oidc.outputs.token }}" \
                "${endpoint}" || echo "000"
            )

            if [[ -f response.json ]]; then
              cat response.json
              echo
            fi

            if [[ "${status}" =~ ^2 ]]; then
              exit 0
            fi

            echo "Attempt ${attempt} failed with HTTP ${status}" >&2
            sleep $((attempt * 20))
          done

          exit 1
